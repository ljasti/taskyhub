---
# playbooks/02-deploy-taskyhub.yml
# This playbook deploys the TaskyHub application stack including:
# - Main Application API and UI
# - PostgreSQL Database (parameterized per customer)
# - Automation Engine (AE) based on n8n
# - Grafana Dashboards
#
# Data Sources:
# - ../vault/secrets.yml: Encrypted passwords and sensitive hashes
# - ../vars.yml: Customer-specific variables (customer_name, domains, etc.)
# - ../group_vars/tasky_servers.yml: Global project conventions

- name: Deploy TaskyHub Application
  hosts: tasky_servers
  become: yes

  vars_files:
    - ../vault/secrets.yml              # Encrypted secrets
    - ../vars.yml                       # Customer-specific vars
    - ../group_vars/tasky_servers.yml   # Naming conventions

  vars:
    app_dir: /opt/taskyhub
    compose_file: "{{ app_dir }}/docker-compose.yml"
    # From your repo tree: local/app contains api, ui, grafana, init.sql, tasky.conf
    local_app_dir: "{{ playbook_dir }}/../../../local/app"
    ae_logs_dir: "/opt/{{ customer_name }}/ae-logs"

  pre_tasks:
    - name: Set postgres container name
      set_fact:
        postgres_container: "{{ customer_name }}_postgres"

    - name: Verify required secrets are defined
      assert:
        that:
          - customer_name is defined
          - postgres_password is defined
          - taskyhub_db_password is defined
          - ae_db_password is defined
          - grafana_db_password is defined
          - jwt_secret is defined
          - tasky_admin_password is defined
          - grafana_admin_user is defined
          - grafana_admin_password is defined
          - admin_password_hash is defined
          - user_password_hash is defined
        fail_msg: "Missing required variables. Check vault/secrets.yml and vars.yml"
        success_msg: "✅ All required secrets loaded successfully"

    - name: Display deployment configuration
      debug:
        msg: |
          ==========================================
          TaskyHub Deployment: {{ customer_name }}
          ==========================================
          Database Users:
            - Main: {{ postgres_db_user }}
            - AE: {{ ae_db_user }}
            - Grafana: {{ grafana_db_user }}
          Database Names:
            - Main: {{ postgres_db_name }}
            - AE: {{ ae_db_name }}
            - Grafana: {{ grafana_db_name }}
          Application Users:
            - Admin: {{ default_admin_username }}@taskyhub.local
            - User: {{ default_user_username }}@taskyhub.local
          Subscription: {{ subscription_id }}
          UI URL: {{ ui_base_url | default('https://' + (ui_domain | default('UNDEFINED'))) }}
          UI Host Port: {{ ui_host_port | default('UNDEFINED') }}
          API URL (browser): {{ api_base_url | default('https://' + (ui_domain | default('UNDEFINED')) + '/api') }}
          API Host Port (localhost): {{ api_host_port | default('UNDEFINED') }}
          ==========================================

  tasks:
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Ensure AE logs directory exists
      file:
        path: "{{ ae_logs_dir }}"
        state: directory
        owner: "1000"
        group: "1000"
        mode: "0755"

    - name: Ensure logrotate is installed
      apt:
        name: logrotate
        state: present
        update_cache: yes

    - name: Configure logrotate for AE logs (7-day retention)
      template:
        src: "{{ playbook_dir }}/../templates/logrotate_n8n.conf.j2"
        dest: "/etc/logrotate.d/n8n-{{ customer_name }}"
        mode: "0644"

    - name: Copy API from local/app
      copy:
        src: "{{ local_app_dir }}/api/"
        dest: "{{ app_dir }}/api/"
        mode: preserve

    - name: Copy UI from local/app
      copy:
        src: "{{ local_app_dir }}/ui/"
        dest: "{{ app_dir }}/ui/"
        mode: preserve

    - name: Copy Grafana from local/app
      copy:
        src: "{{ local_app_dir }}/grafana/"
        dest: "{{ app_dir }}/grafana/"
        mode: preserve

    - name: Template init.sql with parameterized naming
      template:
        src: "{{ playbook_dir }}/../roles/taskyhub_deploy/templates/init.sql.j2"
        dest: "{{ app_dir }}/init.sql"
        mode: "0644"

    - name: Template docker-compose.yml (server version)
      template:
        src: "{{ playbook_dir }}/../templates/docker-compose.yml.j2"
        dest: "{{ compose_file }}"
        mode: "0644"

    - name: Start Postgres first
      command: docker compose -f "{{ compose_file }}" up -d postgres
      args:
        chdir: "{{ app_dir }}"

    - name: Wait for Postgres healthcheck
      command: docker inspect --format={{ '{{.State.Health.Status}}' }} {{ postgres_container }}
      register: postgres_health
      retries: 60
      delay: 2
      changed_when: false
      until: postgres_health.stdout == "healthy"

    # ---------- DATABASE & ROLE INITIALIZATION (idempotent) ----------

    - name: Render TaskyHub DB + role bootstrap SQL for this customer
      template:
        src: "{{ playbook_dir }}/../templates/create_taskyhub_db.sql.j2"
        dest: "/tmp/create_taskyhub_db_{{ postgres_db_name }}.sql"
        mode: "0644"

    - name: Create TaskyHub DB and role if missing
      shell: |
        docker exec -e PGPASSWORD='{{ postgres_password }}' -i {{ postgres_container }} \
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 \
          < /tmp/create_taskyhub_db_{{ postgres_db_name }}.sql
      args:
        executable: /bin/bash

    - name: Render TaskyHub schema/seed SQL for this customer
      template:
        src: "{{ playbook_dir }}/../templates/init_taskyhub_schema.sql.j2"
        dest: "/tmp/init_taskyhub_schema_{{ postgres_db_name }}.sql"
        mode: "0644"

    - name: Run TaskyHub schema/seed SQL for this customer
      shell: |
        docker exec -e PGPASSWORD='{{ taskyhub_db_password }}' -i {{ postgres_container }} \
          psql -h 127.0.0.1 -U {{ postgres_db_user }} -d {{ postgres_db_name }} -v ON_ERROR_STOP=1 \
          < /tmp/init_taskyhub_schema_{{ postgres_db_name }}.sql
      args:
        executable: /bin/bash

    - name: Ensure AE and Grafana databases and users are correct
      shell: |
        docker exec -e PGPASSWORD='{{ postgres_password }}' -i {{ postgres_container }} psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
        DO $$
        BEGIN
          IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '{{ ae_db_user }}') THEN
            CREATE ROLE {{ ae_db_user }} LOGIN PASSWORD '{{ ae_db_password }}';
          ELSE
            ALTER ROLE {{ ae_db_user }} WITH LOGIN PASSWORD '{{ ae_db_password }}';
          END IF;
          IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '{{ grafana_db_user }}') THEN
            CREATE ROLE {{ grafana_db_user }} LOGIN PASSWORD '{{ grafana_db_password }}';
          ELSE
            ALTER ROLE {{ grafana_db_user }} WITH LOGIN PASSWORD '{{ grafana_db_password }}';
          END IF;
        END
        $$;

        SELECT 'CREATE DATABASE {{ ae_db_name }} OWNER {{ ae_db_user }}'
        WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = '{{ ae_db_name }}') \gexec
        SELECT 'CREATE DATABASE {{ grafana_db_name }} OWNER {{ grafana_db_user }}'
        WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = '{{ grafana_db_name }}') \gexec

        GRANT ALL PRIVILEGES ON DATABASE {{ ae_db_name }} TO {{ ae_db_user }};
        GRANT ALL PRIVILEGES ON DATABASE {{ grafana_db_name }} TO {{ grafana_db_user }};
        SQL
      args:
        executable: /bin/bash

    - name: Wait until required roles exist
      command: >
        docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }}
        psql -h 127.0.0.1 -U postgres -d postgres -tAc
        "SELECT COUNT(*) FROM pg_roles WHERE rolname IN ('{{ postgres_db_user }}','{{ ae_db_user }}','{{ grafana_db_user }}');"
      register: role_count
      retries: 30
      delay: 2
      changed_when: false
      until: (role_count.stdout | trim) == "3"

    - name: Wait until required databases exist
      command: >
        docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }}
        psql -h 127.0.0.1 -U postgres -d postgres -tAc
        "SELECT COUNT(*) FROM pg_database WHERE datname IN ('{{ postgres_db_name }}','{{ ae_db_name }}','{{ grafana_db_name }}');"
      register: db_count
      retries: 30
      delay: 2
      changed_when: false
      until: (db_count.stdout | trim) == "3"

    # ---------- Schema grants ----------

    - name: Ensure schema grants in main app database
      command: >
        docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }} psql -h 127.0.0.1 -U postgres -d {{ postgres_db_name }} -v ON_ERROR_STOP=1 -c
        "GRANT ALL ON SCHEMA public TO {{ postgres_db_user }}; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ postgres_db_user }}; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ postgres_db_user }}; GRANT USAGE ON SCHEMA public TO {{ grafana_db_user }}; GRANT SELECT ON ALL TABLES IN SCHEMA public TO {{ grafana_db_user }}; GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO {{ grafana_db_user }}; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO {{ grafana_db_user }};"

    - name: Ensure schema grants in AE (n8n) database
      command: >
        docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }} psql -h 127.0.0.1 -U postgres -d {{ ae_db_name }} -v ON_ERROR_STOP=1 -c
        "GRANT ALL ON SCHEMA public TO {{ ae_db_user }}; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ ae_db_user }}; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ ae_db_user }}; GRANT USAGE ON SCHEMA public TO {{ postgres_db_user }}; GRANT SELECT ON ALL TABLES IN SCHEMA public TO {{ postgres_db_user }}; GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO {{ postgres_db_user }}; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO {{ postgres_db_user }}; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON SEQUENCES TO {{ postgres_db_user }};"

    - name: Ensure schema grants in Grafana database
      command: >
        docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }} psql -h 127.0.0.1 -U postgres -d {{ grafana_db_name }} -v ON_ERROR_STOP=1 -c
        "GRANT ALL ON SCHEMA public TO {{ grafana_db_user }}; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ grafana_db_user }}; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO {{ grafana_db_user }};"

    # ---------- App tables verification ----------

    - name: Ensure TaskyHub app tables exist
      command: >
        docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }}
        psql -h 127.0.0.1 -U postgres -d {{ postgres_db_name }} -tAc
        "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('users','subscriptions');"
      register: app_tables
      retries: 30
      delay: 2
      changed_when: false
      until: (app_tables.stdout | trim) == "2"

    # ---------- Start services: API, AE (n8n), Grafana, UI ----------

    - name: Start API after DB is ready
      command: docker compose -f "{{ compose_file }}" up -d --build api
      args:
        chdir: "{{ app_dir }}"

    - name: Start UI after API (rebuild to pick up latest UI changes)
      command: docker compose -f "{{ compose_file }}" up -d --build ui
      args:
        chdir: "{{ app_dir }}"

    - name: Start AE (n8n) after API
      command: docker compose -f "{{ compose_file }}" up -d ae
      args:
        chdir: "{{ app_dir }}"

    - name: Start Grafana after AE
      command: docker compose -f "{{ compose_file }}" up -d grafana
      args:
        chdir: "{{ app_dir }}"

    - name: Ensure all containers are running and healthy
      command: docker compose -f "{{ compose_file }}" up -d --wait
      args:
        chdir: "{{ app_dir }}"

    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Remove default Nginx site
      file:
        path: "{{ nginx_sites_enabled_dir }}/default"
        state: absent

    - name: Set primary Let's Encrypt domain (first item)
      set_fact:
        letsencrypt_primary_domain: "{{ letsencrypt_domains[0] }}"
      when: letsencrypt_domains | length > 0

    - name: Deploy HTTPS-enabled Nginx vhost for UI + API
      template:
        src: "{{ playbook_dir }}/../templates/nginx_vhost.conf.j2"
        dest: "{{ nginx_sites_available_dir }}/{{ ui_domain }}.conf"
        owner: root
        group: root
        mode: "0644"
      vars:
        server_name: "{{ ui_domain }}"
        cert_name: "{{ letsencrypt_primary_domain | default(ui_domain) }}"
        backend_port: "{{ ui_host_port }}"
        ssl_enabled: true

    - name: Enable UI site
      file:
        src: "{{ nginx_sites_available_dir }}/{{ ui_domain }}.conf"
        dest: "{{ nginx_sites_enabled_dir }}/{{ ui_domain }}.conf"
        state: link
        force: yes

    - name: Deploy HTTPS-enabled Nginx vhost for AE
      template:
        src: "{{ playbook_dir }}/../templates/nginx_vhost.conf.j2"
        dest: "{{ nginx_sites_available_dir }}/{{ ae_domain }}.conf"
        owner: root
        group: root
        mode: "0644"
      vars:
        server_name: "{{ ae_domain }}"
        cert_name: "{{ letsencrypt_primary_domain | default(ui_domain) }}"
        backend_port: "{{ ae_host_port }}"
        api_host_port: ""
        ssl_enabled: true

    - name: Enable AE site
      file:
        src: "{{ nginx_sites_available_dir }}/{{ ae_domain }}.conf"
        dest: "{{ nginx_sites_enabled_dir }}/{{ ae_domain }}.conf"
        state: link
        force: yes

    - name: Test nginx config
      command: nginx -t
      changed_when: false

    - name: Reload nginx
      service:
        name: nginx
        state: reloaded

  post_tasks:
    - name: Deployment complete
      debug:
        msg: |
          ==========================================
          ✅ TaskyHub Deployment Complete!
          ==========================================
          Customer: {{ customer_name }}
          Access: {{ ui_base_url | default('https://' + (ui_domain | default('UNDEFINED'))) }}
          
          Database Configuration:
            - Main DB: {{ postgres_db_name }} / {{ postgres_db_user }}
            - AE DB: {{ ae_db_name }} / {{ ae_db_user }}
            - Grafana DB: {{ grafana_db_name }} / {{ grafana_db_user }}
          
          Default Users:
            - Admin: {{ default_admin_username }}@taskyhub.local
            - User: {{ default_user_username }}@taskyhub.local
          ==========================================
