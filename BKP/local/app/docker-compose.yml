version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: poc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pwd
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - poc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: poc-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: n8n_user
      DB_POSTGRESDB_PASSWORD: n8n_pwd
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: taskyhub
      N8N_BASIC_AUTH_PASSWORD: local_n8n_pwd
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - poc-net
    ports:
      - "5678:5678"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const net=require('net');const s=net.connect(5678,'127.0.0.1');s.on('connect',()=>process.exit(0));s.on('error',()=>process.exit(1));\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: poc-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: taskyhub_admin
      GF_SECURITY_ADMIN_PASSWORD: T4skyhub@dm1n!

      # Branding
      GF_BRANDING_APP_TITLE: TaskyHub
      GF_BRANDING_LOGIN_TITLE: TaskyHub Login

      # Security - Allow embedding
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      
      # Auth
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      
      # Default dashboard
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/taskyhub-overview.json

      # ✅ FIXED: dedicated DB
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres
      GF_DATABASE_NAME: grafana_db
      GF_DATABASE_USER: grafana_user
      GF_DATABASE_PASSWORD: grafana_pwd
      GF_DATABASE_SSL_MODE: disable

    ports:
      - "3000:3000"
    networks:
      - poc-net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: taskyhub-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      JWT_SECRET: taskyhub-secret
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskyhub_db
      DB_USER: taskyhub_user
      DB_PASSWORD: taskyhub_pwd
      TASKY_ADMIN_EMAIL: devops@taskyhub.local
      TASKY_ADMIN_PASSWORD: admin123
      TASKY_SUBSCRIPTION_ID: 11111111-1111-1111-1111-111111111111
      GRAFANA_URL: http://localhost:3000
      # AE_INTERNAL_URL is for container-to-container communication (Docker network DNS).
      # AE_PUBLIC_URL is what the browser should use (localhost ports).
      AE_INTERNAL_URL: http://n8n:5678
      AE_PUBLIC_URL: http://localhost:5678
      TASKY_PUBLIC_URL: http://localhost:8080
      TASKY_N8N_PATH_PREFIX: ""
      TASKY_N8N_BASIC_AUTH_USER: taskyhub
      TASKY_N8N_BASIC_AUTH_PASSWORD: local_n8n_pwd
      TASKY_INTEGRATIONS_ENCRYPTION_KEY_B64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      # AE DB connection (used by dashboard endpoints querying execution/workflow tables)
      AE_DB_NAME: n8n_db
      AE_DB_USER: n8n_user
      AE_DB_PASSWORD: n8n_pwd
      API_ALLOWED_ORIGINS: "http://localhost:8080"
    volumes:
      - ./api/data:/usr/src/app/data
    networks:
      - poc-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');http.get('http://127.0.0.1:4000/api/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: poc-ui
    restart: unless-stopped
    environment:
      API_URL: http://localhost:4000/api
    ports:
      - "8080:80"
    networks:
      - poc-net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  n8n_data:
  grafana_data:

networks:
  poc-net:
    driver: bridge
