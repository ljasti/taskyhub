<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskyHub Login</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="alternate icon" href="images/favicon.ico">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }

    .box {
      background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
      padding: 48px;
      border-radius: 24px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
    }

    .logo {
      display: block;
      width: 100%;
      max-width: 480px;
      margin: 0 auto 40px;
    }

    h2 {
      margin: 0 0 28px;
      font-size: 1.1rem;
      font-weight: 300;
      text-align: center;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      margin: 12px 0;
      border-radius: 12px;
      border: 1px solid rgba(51, 65, 85, 0.9);
      background: #0f172a;
      color: white;
      font-size: 1rem;
      transition: all 0.2s ease;
      outline: none;
    }

    input::placeholder {
      color: #64748b;
    }

    input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      border: none;
      color: #0f172a;
      font-weight: 800;
      font-size: 1.05rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 15px -3px rgba(249, 115, 22, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px -5px rgba(249, 115, 22, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    .login-hint {
      margin-top: 24px;
      text-align: center;
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.7;
    }

    .login-hint code {
      background: #0f172a;
      padding: 4px 8px;
      border-radius: 6px;
      color: #f97316;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">
      <img class="logo" src="images/logo.png" alt="TaskyHub logo">
      <h2>Welcome Back</h2>
      <input id="email" placeholder="Email (e.g., devops@taskyhub.local)" type="email">
      <input id="pass" type="password" placeholder="Password">
      <button onclick="login()">Sign In</button>
      <div class="login-hint">
        <strong>Default Accounts:</strong><br>
        Admin: <code>devops@taskyhub.local</code><br>
        User: <code>developer@taskyhub.local</code>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    function normalizeApiBaseUrl(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      if (raw === '/api') return `${window.location.origin}/api`;
      if (raw.startsWith('/')) return `${window.location.origin}${raw}`;
      return raw.replace(/\/+$/, '');
    }

    const API_BASE_URL =
      normalizeApiBaseUrl(window.API_BASE_URL) ||
      normalizeApiBaseUrl(window.TASKYHUB_CONFIG?.API_URL) ||
      `${window.location.origin}/api`;

    if (localStorage.getItem('tasky_token')) {
      window.location = 'dashboard.html';
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('pass').value;

      if (!email || !password) {
        alert('Please enter both email and password.');
        return;
      }

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        // Read raw text so we can handle non-JSON (HTML 404 pages, etc.)
        const text = await response.text();

        if (!response.ok) {
          let message = 'Login failed';

          // Try to parse JSON error, fall back to plain text/HTML
          try {
            const maybeJson = JSON.parse(text);
            if (maybeJson && (maybeJson.error || maybeJson.message)) {
              message = maybeJson.error || maybeJson.message;
            }
          } catch (e) {
            console.error('Non-JSON error response from backend:', text);
          }

          alert(`${message} (HTTP ${response.status})`);
          return;
        }

        // At this point we expect valid JSON
        let payload;
        try {
          payload = JSON.parse(text);
        } catch (e) {
          console.error('Expected JSON but got:', text);
          alert('Unexpected response from TaskyHub backend. Please try again later.');
          return;
        }

        if (!payload || !payload.token) {
          alert('Login succeeded but no token returned from backend.');
          console.warn('Login response without token:', payload);
          return;
        }

        localStorage.setItem('tasky_token', payload.token);
        if (payload.user) {
          localStorage.setItem('tasky_user', JSON.stringify(payload.user));
        }

        window.location = 'dashboard.html';
      } catch (error) {
        console.error('Network or fetch error:', error);
        alert('Unable to reach the TaskyHub backend.');
      }
    }

    document.getElementById('pass').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        login();
      }
    });

    document.getElementById('email').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('pass').focus();
      }
    });
  </script>
</body>
</html>
