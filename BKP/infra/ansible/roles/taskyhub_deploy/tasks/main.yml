---
- name: Ensure application directory exists
  file:
    path: "{{ app_dir }}"
    state: directory
    mode: "0755"

- name: Copy application stack assets
  copy:
    src: "{{ playbook_dir }}/../../../local/app/"
    dest: "{{ app_dir }}/"
    mode: preserve

- name: Render init.sql with customer naming conventions
  template:
    src: init.sql.j2
    dest: "{{ app_dir }}/init.sql"
    mode: "0644"
