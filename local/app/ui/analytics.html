<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskyHub Analytics</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="alternate icon" href="images/favicon.ico">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #020617 0%, #020617 100%);
      color: white;
      min-height: 100vh;
    }

    header {
      padding: 20px 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: opacity 0.2s;
      min-width: 360px;
    }

    .brand:hover {
      opacity: 0.9;
    }

    .brand img {
      height: 144px;
      display: block;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    nav a:hover {
      color: #f97316;
      background: rgba(249, 115, 22, 0.1);
    }

    nav a.active {
      color: #f97316;
      background: rgba(249, 115, 22, 0.15);
    }

    button {
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      color: #0f172a;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.3);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 12px -2px rgba(249, 115, 22, 0.4);
    }

    .content {
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .page-title {
      text-align: center;
      margin-bottom: 32px;
    }

    .page-title h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #f97316 0%, #fbbf24 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .page-title p {
      color: #94a3b8;
      font-size: 1.1rem;
    }

    .card {
      background: linear-gradient(145deg, #111827 0%, #0f172a 100%);
      padding: 28px;
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
      margin-bottom: 24px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: rgba(249, 115, 22, 0.3);
    }

    .card h3 {
      font-size: 1.35rem;
      margin-bottom: 12px;
      color: #f9fafb;
    }

    .card p {
      color: #94a3b8;
      line-height: 1.7;
    }

    .iframe-container {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
    }

    .iframe-container iframe {
      width: 100%;
      height: 700px;
      border: none;
      display: block;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand" onclick="window.location.href='dashboard.html'">
      <img src="images/logo.png" alt="TaskyHub logo">
    </div>
    <div class="header-right">
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="analytics.html" class="active">Analytics</a>
      </nav>
      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="content">
    <div class="page-title">
      <h1>Analytics</h1>
      <p>Real-time monitoring and metrics for your TaskyHub workflows and system performance.</p>
    </div>

    <div class="card">
      <h3>Analytics Overview</h3>
      <p id="status-text">Analytics dashboard loaded successfully.</p>
    </div>

    <div class="iframe-container">
      <iframe id="grafana-iframe" src="about:blank" title="TaskyHub Analytics"></iframe>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    function normalizeApiBaseUrl(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      if (raw === '/api') return `${window.location.origin}/api`;
      if (raw.startsWith('/')) return `${window.location.origin}${raw}`;
      return raw.replace(/\/+$/, '');
    }

    const API_BASE_URL =
      normalizeApiBaseUrl(window.API_BASE_URL) ||
      normalizeApiBaseUrl(window.TASKYHUB_CONFIG?.API_URL) ||
      `${window.location.origin}/api`;
    const GRAFANA_URL = window.TASKYHUB_CONFIG?.GRAFANA_URL || 'http://localhost:3000';
    const token = localStorage.getItem('tasky_token');

    if (!token) {
      window.location = 'login.html';
    }

    document.getElementById('grafana-iframe').src = GRAFANA_URL;

    function logout() {
      localStorage.clear();
      window.location = 'login.html';
    }

    async function fetchAnalytics() {
      try {
        const response = await fetch(`${API_BASE_URL}/me`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!response.ok) throw new Error('Not authenticated');
        document.getElementById('status-text').innerText = 'Analytics dashboard is available for your subscription.';
      } catch (error) {
        console.error('Analytics auth failed', error);
        localStorage.clear();
        window.location = 'login.html';
      }
    }

    window.onload = fetchAnalytics;
  </script>
</body>
</html>
