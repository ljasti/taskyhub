server {
    listen 80;
    server_name tasky.amroth.life;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tasky.amroth.life;

    ssl_certificate /etc/letsencrypt/live/tasky.amroth.life/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tasky.amroth.life/privkey.pem;

    root /opt/taskyhub/ui;
    index index.html;

    # PUBLIC ROUTES
    location / {
        try_files $uri /index.html;
    }

    location /login {
        try_files $uri /login.html;
    }

    location /dashboard {
        try_files $uri /dashboard.html;
    }

    # N8N UI (protected path)
    location /n8n/ {
        proxy_pass http://127.0.0.1:5678/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /webhook/ {
        proxy_pass http://127.0.0.1:5678/webhook/;
    }
}