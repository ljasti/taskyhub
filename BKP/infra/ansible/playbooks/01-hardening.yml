---
- name: TaskyHub Security Hardening
  hosts: tasky_servers
  become: yes

  vars:
    allowed_ssh_port: 22

  roles:
    - role: ../roles/security_hardening
      tags: [hardening, security]

  post_tasks:
    - name: Display hardening completion message
      debug:
        msg: |
          ========================================
          Security Hardening Complete!
          ========================================
          New Users Created:
            - supertasky (sudo access)
            - tasky (limited sudo)

          Ubuntu User: DISABLED

          SSH Access:
            - Password authentication: DISABLED
            - Root login: DISABLED
            - Key-based only: ENABLED

          Next Steps:
            1. Test SSH: ssh supertasky@{{ ansible_host }}
            2. Run deployment: ansible-playbook playbooks/02-deploy-taskyhub.yml
