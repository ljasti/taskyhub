version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: poc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_pwd
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - poc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: poc-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: n8n_user
      DB_POSTGRESDB_PASSWORD: n8n_pwd
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - poc-net
    ports:
      - "5678:5678"

  grafana:
    image: grafana/grafana:latest
    container_name: poc-grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: taskyhub_admin
      GF_SECURITY_ADMIN_PASSWORD: T4skyhub@dm1n!

      # Branding
      GF_BRANDING_APP_TITLE: TaskyHub
      GF_BRANDING_LOGIN_TITLE: TaskyHub Login

      # Security - Allow embedding
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      
      # Auth
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      
      # Default dashboard
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/taskyhub-overview.json

      # ✅ FIXED: dedicated DB
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres
      GF_DATABASE_NAME: grafana_db
      GF_DATABASE_USER: grafana_user
      GF_DATABASE_PASSWORD: grafana_pwd
      GF_DATABASE_SSL_MODE: disable

    ports:
      - "3000:3000"
    networks:
      - poc-net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: taskyhub-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      JWT_SECRET: taskyhub-secret
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskyhub_db
      DB_USER: taskyhub_user
      DB_PASSWORD: taskyhub_pwd
      GRAFANA_URL: http://localhost:3000
      N8N_URL: http://localhost:5678
    volumes:
      - ./api/data:/usr/src/app/data
    networks:
      - poc-net
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: poc-ui
    restart: unless-stopped
    environment:
      API_URL: http://localhost:4000/api
    ports:
      - "8080:80"
    networks:
      - poc-net
    depends_on:
      - api

volumes:
  pg_data:
  n8n_data:
  grafana_data:

networks:
  poc-net:
    driver: bridge