<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TaskyHub Login</title>
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<link rel="alternate icon" href="images/favicon.ico">

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.container{width:100%;max-width:380px;padding:32px;}
.box{background:#111827;padding:32px;border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.35);}
.logo{display:block;width:180px;max-width:100%;margin:0 auto 20px;}
h2{margin:0 0 24px;font-size:2rem;text-align:center;color:#ff9b3a;}
input{width:100%;padding:12px;margin:10px 0;border-radius:12px;border:1px solid #2e3a56;background:#0f172a;color:white;}
button{width:100%;padding:12px;margin-top:16px;background:linear-gradient(135deg,#ff7a1d,#ffb149);border:none;color:#0b1220;font-weight:700;border-radius:12px;cursor:pointer;}

.box{
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:320px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #333;
  background:#0f172a;
  color:white;
}

button{
  width:100%;
  padding:10px;
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  border:none;
  color:black;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="box">
    <img class="logo" src="images/logo.png" alt="TaskyHub logo">
    <h2>TaskyHub Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<script>
function login(){
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    let role = null;

    // ADMIN
    if(u==="admin" && p==="admin123"){
        role = "admin";
    }

    // USER
    else if(u==="user" && p==="user123"){
        role = "user";
    }

    else {
        alert("Invalid credentials");
        return;
    }

    localStorage.setItem("tasky_auth","true");
    localStorage.setItem("tasky_role",role);

    window.location = "dashboard.html";
}
</script>

</body>
</html>
