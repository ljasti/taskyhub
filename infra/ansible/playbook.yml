---
- name: Deploy TaskyHub
  hosts: tasky-server
  become: yes

  vars_files:
    - vars.yml

  vars:
    app_dir: /home/{{ ansible_user }}/taskyhub
    compose_file: "{{ app_dir }}/docker-compose.yml"
    local_app_dir: "{{ playbook_dir }}/../../local/app"
    postgres_container: "{{ customer_name }}_postgres"

  tasks:

  - name: Create app directory
    file:
      path: "{{ app_dir }}"
      state: directory
      mode: "0755"

  - name: Copy API
    copy:
      src: "{{ local_app_dir }}/api/"
      dest: "{{ app_dir }}/api/"
      mode: preserve

  - name: Copy UI
    copy:
      src: "{{ local_app_dir }}/ui/"
      dest: "{{ app_dir }}/ui/"
      mode: preserve

  - name: Copy Grafana
    copy:
      src: "{{ local_app_dir }}/grafana/"
      dest: "{{ app_dir }}/grafana/"
      mode: preserve

  - name: Copy init.sql
    copy:
      src: "{{ local_app_dir }}/init.sql"
      dest: "{{ app_dir }}/init.sql"
      mode: "0644"

  - name: Template docker-compose.yml
    template:
      src: docker-compose.yml.j2
      dest: "{{ compose_file }}"

  - name: Start Postgres first
    command: docker compose -f "{{ compose_file }}" up -d postgres
    args:
      chdir: "{{ app_dir }}"

  - name: Wait for Postgres healthcheck to report healthy
    command: docker inspect --format={{ '{{.State.Health.Status}}' }} {{ postgres_container }}
    register: postgres_health
    retries: 60
    delay: 2
    changed_when: false
    until: postgres_health.stdout == "healthy"

  - name: Ensure databases, users, passwords, and grants are correct
    shell: |
      docker exec -e PGPASSWORD='{{ postgres_password }}' -i {{ postgres_container }} psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
      DO $$
      BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'taskyhub_user') THEN
          CREATE ROLE taskyhub_user LOGIN PASSWORD '{{ taskyhub_db_password }}';
        ELSE
          ALTER ROLE taskyhub_user WITH LOGIN PASSWORD '{{ taskyhub_db_password }}';
        END IF;
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'ae_user') THEN
          CREATE ROLE ae_user LOGIN PASSWORD '{{ ae_db_password }}';
        ELSE
          ALTER ROLE ae_user WITH LOGIN PASSWORD '{{ ae_db_password }}';
        END IF;
        IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'grafana_user') THEN
          CREATE ROLE grafana_user LOGIN PASSWORD '{{ grafana_db_password }}';
        ELSE
          ALTER ROLE grafana_user WITH LOGIN PASSWORD '{{ grafana_db_password }}';
        END IF;
      END
      $$;

      SELECT 'CREATE DATABASE taskyhub_db OWNER taskyhub_user'
      WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'taskyhub_db') \gexec
      SELECT 'CREATE DATABASE ae_db OWNER ae_user'
      WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'ae_db') \gexec
      SELECT 'CREATE DATABASE grafana_db OWNER grafana_user'
      WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'grafana_db') \gexec

      GRANT ALL PRIVILEGES ON DATABASE taskyhub_db TO taskyhub_user;
      GRANT ALL PRIVILEGES ON DATABASE ae_db TO ae_user;
      GRANT ALL PRIVILEGES ON DATABASE grafana_db TO grafana_user;
      SQL
    args:
      executable: /bin/bash

  - name: Wait until required roles exist
    command: >
      docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }}
      psql -h 127.0.0.1 -U postgres -d postgres -tAc
      "SELECT COUNT(*) FROM pg_roles WHERE rolname IN ('taskyhub_user','ae_user','grafana_user');"
    register: role_count
    retries: 30
    delay: 2
    changed_when: false
    until: (role_count.stdout | trim) == "3"

  - name: Wait until required databases exist
    command: >
      docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }}
      psql -h 127.0.0.1 -U postgres -d postgres -tAc
      "SELECT COUNT(*) FROM pg_database WHERE datname IN ('taskyhub_db','ae_db','grafana_db');"
    register: db_count
    retries: 30
    delay: 2
    changed_when: false
    until: (db_count.stdout | trim) == "3"

  - name: Ensure schema grants in taskyhub_db
    command: >
      docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }} psql -h 127.0.0.1 -U postgres -d taskyhub_db -v ON_ERROR_STOP=1 -c
      "GRANT ALL ON SCHEMA public TO taskyhub_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO taskyhub_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO taskyhub_user; GRANT USAGE ON SCHEMA public TO grafana_user; GRANT SELECT ON ALL TABLES IN SCHEMA public TO grafana_user; GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO grafana_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO grafana_user;"

  - name: Ensure schema grants in ae_db
    command: >
      docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }} psql -h 127.0.0.1 -U postgres -d ae_db -v ON_ERROR_STOP=1 -c
      "GRANT ALL ON SCHEMA public TO ae_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO ae_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO ae_user; GRANT USAGE ON SCHEMA public TO taskyhub_user; GRANT SELECT ON ALL TABLES IN SCHEMA public TO taskyhub_user; GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO taskyhub_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO taskyhub_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON SEQUENCES TO taskyhub_user;"

  - name: Ensure schema grants in grafana_db
    command: >
      docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }} psql -h 127.0.0.1 -U postgres -d grafana_db -v ON_ERROR_STOP=1 -c
      "GRANT ALL ON SCHEMA public TO grafana_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO grafana_user; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO grafana_user;"

  - name: Ensure TaskyHub app tables exist from init.sql
    command: >
      docker exec -e PGPASSWORD={{ postgres_password }} {{ postgres_container }}
      psql -h 127.0.0.1 -U postgres -d taskyhub_db -tAc
      "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('users','subscriptions');"
    register: app_tables
    retries: 30
    delay: 2
    changed_when: false
    until: (app_tables.stdout | trim) == "2"

  - name: Start API after DB is ready
    command: docker compose -f "{{ compose_file }}" up -d api
    args:
      chdir: "{{ app_dir }}"

  - name: Start ae after API
    command: docker compose -f "{{ compose_file }}" up -d ae
    args:
      chdir: "{{ app_dir }}"

  - name: Start Grafana after ae
    command: docker compose -f "{{ compose_file }}" up -d grafana
    args:
      chdir: "{{ app_dir }}"

  - name: Start UI after backend services
    command: docker compose -f "{{ compose_file }}" up -d ui
    args:
      chdir: "{{ app_dir }}"

  - name: Template nginx config
    template:
      src: ui/tasky.conf.j2
      dest: "{{ nginx_conf_path }}"

  - name: Enable nginx site
    file:
      src: "{{ nginx_conf_path }}"
      dest: "{{ nginx_enabled_path }}"
      state: link
      force: yes

  - name: Test nginx config
    command: nginx -t

  - name: Restart nginx
    service:
      name: nginx
      state: restarted